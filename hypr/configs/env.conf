# XDG
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

## Cache permission
env = XDG_CONFIG_HOME,$HOME/.config
env = XDG_CACHE_HOME,$HOME/.cache
env = XDG_DATA_HOME,$HOME/.local/share

# QT
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,kvantum
env = QT_PLUGIN_PATH,/usr/lib/qt/plugins:/usr/lib/qt6/plugins
env = QML2_IMPORT_PATH,/usr/lib/qt6/qml:/usr/lib/qt/qml
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# Themes
env = GTK_THEME,catppuccin-mocha-blue-standard+default
env = XCURSOR_THEME,catppuccin-mocha-dark-cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,catppuccin-mocha-dark-cursors
env = HYPRCURSOR_SIZE,24

# Adding GTK theme path
#env = GTK_THEME_PATH,${HOME}/.themes
# env = KDEGLOBALS_THEME,Utterly-Round-Dark

# Window Decoration
